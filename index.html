<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Translator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hamburger Menu Trigger -->
    <button id="openSidebar" class="menu-trigger"><i class="fa-solid fa-bars-staggered"></i></button>

    <!-- Sidebar Overlay & Sidebar -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="heading">Menu</span>
            <button id="closeSidebar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="history-container">
            <p class="section-label">History</p>
            <div id="historyList"></div>
        </div>

        <div class="sidebar-footer">
            <div class="setting-row">
                <span>Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider round"></span>
                </label>
            </div>
            <div class="setting-row">
                <span>Auto-Detect</span>
                <label class="switch">
                    <input type="checkbox" id="autoDetectToggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>
            <button id="logoutBtn" class="pill-button secondary">Logout</button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="app-main">
        <div id="chatArea" class="chat-area">
            <div class="message-group ai">
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">Welcome! Choose a language and type to translate instantly.</div>
            </div>
        </div>

        <!-- Animated Bottom Input -->
        <div class="input-container">
            <div class="pill-bar" id="pillBar">
                <div class="lang-selector">
                    <select id="targetLang">
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="zh-CN">Chinese</option>
                        <option value="te">Telugu</option>
                    </select>
                </div>
                <input type="text" id="userInput" placeholder="Translate something..." autocomplete="off">
                <button id="submitBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
